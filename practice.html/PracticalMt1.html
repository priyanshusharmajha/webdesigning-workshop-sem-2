<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Largest Number Finder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
            width: 320px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

    <div id="container">
        <h2>Find Largest Number</h2>

        <input type="number" id="num1" placeholder="Enter 1st number">
        <input type="number" id="num2" placeholder="Enter 2nd number">
        <input type="number" id="num3" placeholder="Enter 3rd number">
        <input type="number" id="num4" placeholder="Enter 4th number">
        <input type="number" id="num5" placeholder="Enter 5th number">

        <button onclick="findLargest()">Find Largest</button>

        <div id="result"></div>
    </div>
    <script>
        function findLargest() {
            let n1 = parseFloat(document.getElementById("num1").value);
            let n2 = parseFloat(document.getElementById("num2").value);
            let n3 = parseFloat(document.getElementById("num3").value);
            let n4 = parseFloat(document.getElementById("num4").value);
            let n5 = parseFloat(document.getElementById("num5").value);

            let largest;

            if (n1 >= n2 && n1 >= n3 && n1 >= n4 && n1 >= n5) {
                largest = n1;
            }
            else if (n2 >= n1 && n2 >= n3 && n2 >= n4 && n2 >= n5) {
                largest = n2;
            }
            else if (n3 >= n1 && n3 >= n2 && n3 >= n4 && n3 >= n5) {
                largest = n3;
            }
            else if (n4 >= n1 && n4 >= n2 && n4 >= n3 && n4 >= n5) {
                largest = n4;
            }
            else {
                largest = n5;
            }

            document.getElementById("result").innerHTML = "Largest Number is: " + largest;
        }
    </script>

</body>

</html>
