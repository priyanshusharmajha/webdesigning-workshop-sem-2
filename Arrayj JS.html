<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        {
            // print all elements of an array
            let arr = [1, 2, 3];

            for (let i = 0; i < arr.length; i++) {
                console.log(arr[i]);
            }
        }




        {
            // find length
            let arr = [1, 2, 3, 4];
            console.log(arr.length);
        }

        {
            // sum of elements
            let arr = [1, 2, 3, 4];
            let sum = 0;

            for (let i = 0; i < arr.length; i++) {
                sum += arr[i];
            }
            console.log(sum);
        }

        {
            // maximum element
            let arr = [10, 25, 5, 40];
            let max = arr[0];

            for (let i = 1; i < arr.length; i++) {
                if (arr[i] > max) {
                    max = arr[i];
                }
            }
            console.log(max);
        }

        {
            // smallest element
            let arr = [10, 25, 5, 40];
            let min = arr[0];

            for (let i = 1; i < arr.length; i++) {
                if (arr[i] < min) {
                    min = arr[i];
                }
            }
            console.log(min);
        }


        {
            // couunt even/odd
            let arr = [1, 2, 3, 4, 5];
            let even = 0, odd = 0;

            for (let i = 0; i < arr.length; i++) {
                if (arr[i] % 2 === 0) even++;
                else odd++;
            }
            console.log("Even:", even, "Odd:", odd);
        }
    </script>

</body>

</html>
