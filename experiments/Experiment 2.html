<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Salary Management System</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 900px;
            background: white;
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            color: #555;
            margin-bottom: 30px;
        }

        .form-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            gap: 20px;
        }

        form-row label {
            width: 220px;
            font-size: 20px;
            color: #666;
            text-align: center;
        }

        .form-row span {
            font-size: 20px;
            color: #888;
        }

        .form-row input {
            width: 300px;
            padding: 12px;
            font-size: 18px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        button {
            background: #8fd18f;
            color: white;
            border: none;
            padding: 15px 22px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            min-width: 160px;
            font-weight: bold;
        }

        button:hover {
            background: #6fc26f;
        }

        h2 {
            color: #444;
            margin-top: 30px;
        }

        #output {
            margin-top: 15px;
            font-size: 22px;
            color: #555;
            line-height: 1.8;
            background: #fafafa;
            padding: 15px;
            border-radius: 10px;
            min-height: 80px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Employee Salary Management System</h1>
        <div class="form-row">
            <label>Employee Name</label>
            <span>:</span>
            <input type="text" id="empName" placeholder="Employee Name">
        </div>
        <div class="form-row">
            <label>Employee Id</label>
            <span>:</span>
            <input type="text" id="empId" placeholder="Employee Id">
        </div>
        <div class="form-row">
            <label>Employee Salary</label>
            <span>:</span>
            <input type="number" id="emsalary" placeholder="employee salary">
