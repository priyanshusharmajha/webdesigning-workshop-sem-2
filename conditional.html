<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        {
            let num = 4;

            if (num % 2 === 0) {
                console.log("Even");
            } else {
                console.log("Odd");
            }
        }

        {
            // Positive / Negative / Zero
            let num = -5;

            if (num > 0) {
                console.log("Positive");
            } else if (num < 0) {
                console.log("Negative");
            } else {
                console.log("Zero");
            }
        }


        {
            // Largest of 2 numbers
            let a = 10, b = 20;

            if (a > b) {
                console.log("A is largest");
            } else {
                console.log("B is largest");
            }
        }


        {
            // Age check
            let age = 17;

            if (age >= 18) {
                console.log("Eligible");
            } else {
                console.log("Not Eligible");
            }
        }




        {
            // Pass / Fail
            let marks = 40;

            if (marks >= 33) {
                console.log("Pass");
            } else {
                console.log("Fail");
            }
        }


        {
            // Largest of 3 numbers
            let a = 10, b = 25, c = 15;

            if (a > b && a > c) {
                console.log("A is largest");
            } else if (b > a && b > c) {
                console.log("B is largest");
            } else {
                console.log("C is largest");
            }

        }



        {
            //  Grade system
            let marks = 78;

            if (marks >= 90) {
                console.log("A");
            } else if (marks >= 75) {
                console.log("B");
            } else if (marks >= 50) {
                console.log("C");
            } else {
                console.log("Fail");
            }
        }



        {
            // leap year
            let year = 2024;

            if ((year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0)) {
                console.log("Leap Year");
            } else {
                console.log("Not a Leap Year");
            }

        }



        {
            // {check vowel
            let ch = "a";

            if (ch === "a" || ch === "e" || ch === "i" || ch === "o" || ch === "u") {
                console.log("Vowel");
            } else {
                console.log("Consonant");
            }

        }



    </script>







</body>

</html>
